networks:
  superset_oob_network:
    external: true

services:
  oob-assets:
    build: .
    image: superset-oob
    ports:
      - "8082:8082"
    environment:
      - SUPERSET_HOST=http://superset:8088
      - SUPERSET_USERNAME=admin
      - SUPERSET_PASSWORD=admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./.tmp:/app/.tmp
      - ./resources:/app/resources:ro
